name: Update Homebrew Tap

on:
  workflow_dispatch:
    inputs:
      tap_repository:
        description: "Target tap repository, for example owner/homebrew-tap"
        required: true
      version:
        description: "Release version, with or without leading v"
        required: true
      sha256:
        description: "GitHub source archive SHA256 from formula-update.txt"
        required: true
      formula_path:
        description: "Formula path inside the tap repository"
        required: false
        default: "Formula/disk-smi.rb"
      branch:
        description: "Tap branch to update"
        required: false
        default: "main"

permissions:
  contents: read

jobs:
  update:
    runs-on: macos-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          path: source

      - name: Checkout tap
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.tap_repository }}
          path: tap
          ref: ${{ inputs.branch }}
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Update Formula
        run: |
          ruby source/scripts/update_formula.rb \
            --formula "tap/${{ inputs.formula_path }}" \
            --owner "${GITHUB_REPOSITORY_OWNER}" \
            --version "${{ inputs.version }}" \
            --sha256 "${{ inputs.sha256 }}"
          ruby -c "tap/${{ inputs.formula_path }}"

      - name: Commit and push
        working-directory: tap
        run: |
          if git diff --quiet; then
            echo "Formula is already up to date."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${{ inputs.formula_path }}"
          git commit -m "Update disk-smi to ${{ inputs.version }}"
          git push origin "HEAD:${{ inputs.branch }}"
